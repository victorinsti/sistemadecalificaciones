
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trujillo Digital Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

header{
    background:#2563eb;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
}

th{
    background:#1e40af;
    color:white;
}

td,th{
    padding:8px;
    text-align:center;
}

input{
    padding:8px;
}

#portal-alumno{
    display:none;
    min-height:100vh;
    padding:40px 20px;
    background:radial-gradient(circle at top right,#1e293b,#000);
    font-family:'Poppins',sans-serif;
}

.glass-card{
    max-width:1000px;
    margin:auto;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:35px;
}

.welcome-text{
    font-size:2.5rem;
    font-weight:700;
    background:linear-gradient(to right,#60a5fa,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.score-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.score-card{
    background:rgba(255,255,255,.04);
    border-radius:20px;
    padding:20px;
    text-align:center;
    transition:.3s;
    border:1px solid transparent;
}

.score-card:hover{
    transform:translateY(-5px);
    border:1px solid #60a5fa;
}

.score-value{
    display:block;
    font-size:2rem;
    font-weight:700;
    margin-top:10px;
}

.btn-download{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.btn-download:hover{
    opacity:.9;
}

#auth-screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    color:#1e293b;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-sizing:border-box;
}

.login-box input{
    width:100%;
    box-sizing:border-box;
    margin-top:10px;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div id="auth-screen">

    <div class="login-box">

        <h2 style="margin-top:0;">
            Sistema Trujillo
        </h2>

        <p>
            Introduce tu matrícula 
        </p>

        <input
            type="text"
            id="userInput"
            placeholder="Matrícula..."
        >

        <button
            class="btn-download"
            onclick="login()"
            style="width:100%;"
        >
            Entrar
        </button>

    </div>

</div>

<div id="panel-admin" style="display:none;">

    <header>
        Trujillo Digital Hub
    </header>

    <div class="container">

        <div style="
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:20px;
        ">

            <input
                type="text"
                id="buscarMatricula"
                placeholder="Buscar matrícula..."
                oninput="filtrar()"
            >

            <select
                id="filtroMateria"
                onchange="filtrar()"
            >
                <option value="Todas">
                    Todas las materias
                </option>
            </select>
<button
    onclick="entrarClassroomAdmin()"
    class="btn-download"
    style="background:#059669;"
>
    Entrar al Classroom
</button>
            <button
                onclick="location.reload()"
                class="btn-download"
            >
                Cerrar Sesión
            </button>

        </div>

        <table>

            <thead>

                <tr>
                    <th>Matrícula</th>
                    <th>Nombre</th>
                    <th>Materia</th>
                    <th>P1</th>
                    <th>P2</th>
                    <th>P3</th>
                    <th>Promedio</th>
                </tr>

            </thead>

            <tbody id="tabla"></tbody>

        </table>

    </div>

</div>

<div id="portal-alumno">

    <div class="glass-card">

        <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
        ">

            <div>

                <h1
                    class="welcome-text"
                    id="alumno-nombre"
                >
                    Hola
                </h1>

                <p style="color:#94a3b8;">
                    Panel Académico
                </p>

            </div>

            <button
                onclick="location.reload()"
                class="btn-download"
            >
                Salir
            </button>

        </div>

        <div
            class="score-grid"
            id="alumno-cards"
        ></div>

        <div style="
            display:flex;
            gap:15px;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:40px;
        ">

            <button
                class="btn-download"
                onclick="generarBoletaPDF()"
            >
                Descargar Boleta
            </button>

            <button
                class="btn-download"
                style="background:#059669;"
                onclick="irAlClassroom()"
            >
                Entrar a mis Clases
            </button>

        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    updateDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey:"AIzaSyCQa5lpfZ2owUu47CBO6Pe5-wOymUX7wa0",
    authDomain:"campusconnect-9ac9c.firebaseapp.com",
    projectId:"campusconnect-9ac9c"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let datosGlobales = [];
let alumnoLogueado = null;

async function cargarDatos(){

    const snap =
        await getDocs(collection(db,"alumnos"));

    datosGlobales = snap.docs.map(doc => ({
        id:doc.id,
        ...doc.data()
    }));

}

window.login = async () => {

    await cargarDatos();

    const val =
        document
        .getElementById("userInput")
        .value
        .trim();

    if(val.toLowerCase() === "admin"){

        abrirAdmin();
        return;

    }

    const encontrado =
        datosGlobales.filter(
            a => a.matricula === val
        );

    if(encontrado.length > 0){

        alumnoLogueado = encontrado;

        abrirPortalAlumno();

    }else{

        alert("Matrícula no encontrada");

    }

};

function abrirAdmin(){

    document
    .getElementById("auth-screen")
    .style.display = "none";

    document
    .getElementById("panel-admin")
    .style.display = "block";

    llenarMaterias();

    renderTabla(datosGlobales);

}

function abrirPortalAlumno(){

    document
    .getElementById("auth-screen")
    .style.display = "none";

    document
    .getElementById("portal-alumno")
    .style.display = "block";

    const alumno = alumnoLogueado[0];

    document
    .getElementById("alumno-nombre")
    .textContent =
        `Hola, ${alumno.nombre.split(" ")[0]} 👋`;

    const cards =
        document.getElementById("alumno-cards");

    cards.innerHTML = "";

    alumnoLogueado.forEach(m => {

        cards.innerHTML += `

            <div class="score-card">

                <div style="
                    color:#60a5fa;
                    font-size:.8rem;
                    text-transform:uppercase;
                    font-weight:700;
                ">
                    ${m.materia}
                </div>

                <span class="score-value">
                    ${m.promedio.toFixed(1)}
                </span>

                <div style="
                    display:flex;
                    justify-content:space-around;
                    margin-top:15px;
                    color:#94a3b8;
                    font-size:.8rem;
                ">

                    <span>P1 ${m.p1}</span>
                    <span>P2 ${m.p2}</span>
                    <span>P3 ${m.p3}</span>

                </div>

            </div>

        `;

    });

}

function renderTabla(datos){

    const tabla =
        document.getElementById("tabla");

    tabla.innerHTML = "";

    datos.forEach(d => {

        tabla.innerHTML += `

            <tr>

                <td>${d.matricula}</td>

                <td>${d.nombre}</td>

                <td>${d.materia}</td>

                <td>
                    <input
                        value="${d.p1}"
                        onchange="guardar('${d.id}',this)"
                    >
                </td>

                <td>
                    <input
                        value="${d.p2}"
                        onchange="guardar('${d.id}',this)"
                    >
                </td>

                <td>
                    <input
                        value="${d.p3}"
                        onchange="guardar('${d.id}',this)"
                    >
                </td>

                <td>
                    ${d.promedio.toFixed(1)}
                </td>

            </tr>

        `;

    });

}

function llenarMaterias(){

    const select =
        document.getElementById("filtroMateria");

    const materias =
        [...new Set(
            datosGlobales.map(a => a.materia)
        )];

    select.innerHTML =
        `<option value="Todas">
            Todas las materias
        </option>`;

    materias.forEach(m => {

        select.innerHTML += `
            <option value="${m}">
                ${m}
            </option>
        `;

    });

}

window.filtrar = () => {

    const texto =
        document
        .getElementById("buscarMatricula")
        .value
        .toLowerCase();

    const materia =
        document
        .getElementById("filtroMateria")
        .value;

    const filtrados =
        datosGlobales.filter(d => {

            const coincideMatricula =
                d.matricula
                .toLowerCase()
                .includes(texto);

            const coincideMateria =
                materia === "Todas"
                || d.materia === materia;

            return coincideMatricula
                && coincideMateria;

        });

    renderTabla(filtrados);

};

window.guardar = async (id,input) => {

    const row =
        input.parentElement.parentElement;

    const inputs =
        row.querySelectorAll("input");

    const p1 =
        parseFloat(inputs[0].value) || 0;

    const p2 =
        parseFloat(inputs[1].value) || 0;

    const p3 =
        parseFloat(inputs[2].value) || 0;

    const promedio =
        (p1+p2+p3)/3;

    await updateDoc(
        doc(db,"alumnos",id),
        {
            p1,
            p2,
            p3,
            promedio
        }
    );

    row.cells[6].textContent =
        promedio.toFixed(1);

};

window.irAlClassroom = () => {

    if(alumnoLogueado && alumnoLogueado.length > 0){

        const alumno = alumnoLogueado[0];

        localStorage.setItem(
            "usuarioTDH",
            JSON.stringify({
                nombre: alumno.nombre,
                matricula: String(alumno.matricula).trim(),
                rol: "alumno"
            })
        );

    }else{

        localStorage.setItem(
            "usuarioTDH",
            JSON.stringify({
                nombre: "Prof. Trujillo",
                rol: "admin"
            })
        );

    }

    window.location.href = "classroom.html";

};
window.entrarClassroomAdmin = () => {

    localStorage.setItem(
        "usuarioTDH",
        JSON.stringify({
            nombre: "Prof. Trujillo",
            rol: "admin"
        })
    );

    window.location.href = "classroom.html";

};

window.generarBoletaPDF = () => {
    if (!alumnoLogueado) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const alumno = alumnoLogueado[0];
    
    // --- 1. CONFIGURACIÓN DE COLORES ---
    const azulPrimario = [15, 23, 42]; // Slate 900
    const azulAcento = [37, 99, 235];   // Royal Blue

    // --- 2. ENCABEZADO ---
    doc.setFillColor(...azulPrimario);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.text("TRUJILLO DIGITAL HUB", 105, 20, { align: "center" });
    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    doc.text("SISTEMA DE GESTIÓN ACADÉMICA", 105, 28, { align: "center" });

    // --- 3. INFO ALUMNO ---
    doc.setTextColor(...azulPrimario);
    doc.setFontSize(12);
    doc.text("REPORTE OFICIAL DE RENDIMIENTO", 20, 50);
    
    doc.setDrawColor(...azulAcento);
    doc.setLineWidth(0.5);
    doc.line(20, 52, 190, 52);

    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.text(`ALUMNO: ${alumno.nombre.toUpperCase()}`, 20, 62);
    doc.text(`MATRÍCULA: ${alumno.matricula}`, 20, 68);
    doc.text(`FECHA DE EMISIÓN: ${new Date().toLocaleDateString()}`, 140, 62);

    // --- 4. TABLA ---
    const filas = alumnoLogueado.map(m => [
        m.materia.toUpperCase(),
        m.p1.toFixed(1),
        m.p2.toFixed(1),
        m.p3.toFixed(1),
        m.promedio.toFixed(1)
    ]);

    doc.autoTable({
        startY: 75,
        head: [["MATERIA", "P1", "P2", "P3", "FINAL"]],
        body: filas,
        theme: 'striped',
        headStyles: { fillColor: azulPrimario, halign: 'center' },
        bodyStyles: { halign: 'center', fontSize: 9 },
        columnStyles: { 0: { halign: 'left', fontStyle: 'bold', cellWidth: 80 } }
    });

    // --- 5. SECCIÓN DE FIRMAS (DINÁMICA) ---
    // Calculamos el final de la tabla para poner las firmas abajo
    const finalY = doc.lastAutoTable.finalY + 45; 

    doc.setDrawColor(180, 180, 180);
    doc.setLineWidth(0.2);

    // Línea Firma Maestro
    doc.line(30, finalY, 85, finalY);
    doc.setFontSize(9);
    doc.setFont("helvetica", "bold");
    doc.text("ING. VICTOR TRUJILLO", 57.5, finalY + 5, { align: "center" });
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Firma del Titular", 57.5, finalY + 10, { align: "center" });

    // Línea Firma Director
    doc.line(125, finalY, 180, finalY);
    doc.setFontSize(9);
    doc.setFont("helvetica", "bold");
    doc.text("DIRECCIÓN ACADÉMICA", 152.5, finalY + 5, { align: "center" });
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text("Sello y Firma Autorizada", 152.5, finalY + 10, { align: "center" });

    // Elemento decorativo: Sello digital pequeño
    doc.setDrawColor(...azulAcento);
    doc.setLineWidth(0.5);
    doc.circle(105, finalY - 5, 8);
    doc.setFontSize(6);
    doc.setTextColor(...azulAcento);
    doc.text("TDH", 105, finalY - 6, { align: "center" });
    doc.text("VALIDADO", 105, finalY - 3, { align: "center" });

    // --- 6. PIE DE PÁGINA ---
    doc.setTextColor(150, 150, 150);
    doc.setFontSize(7);
    const hash = Math.random().toString(36).substring(2, 15).toUpperCase();
    doc.text(`ID de Validación Digital: ${hash} | Trujillo Digital Hub © 2026`, 105, 285, { align: "center" });

    doc.save(`Boleta_${alumno.matricula}.pdf`);
};
</script>

</body>
